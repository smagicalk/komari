name: build.yml
on:
  workflow_call:
    inputs:
      os:
        type: string
        required: true
        description: 'os [windows,linux] '
      arch:
        type: string
        required: true
        description: 'os arch [amd64,arm64,386]'
        default: 'amd64'
      tag:
        type: string
        default: v1.2.3-pg
        required: false
        description: 'ref'
  workflow_dispatch:
    inputs:
      os:
        type: choice
        required: true
        description: 'os'
        options:
          - windows
          - linux
      arch:
        type: choice
        required: true
        description: 'os arch'
        default: 'amd64'
        options:
          - amd64
          - arm64
          - 386
      tag:
        type: choice
        default: v1.2.3-pg
        required: false
        options:
          - pgdev
          - v1.1.3-pg
          - v1.1.5-pg
          - v1.1.6-pg
          - v1.1.7-pg
          - v1.1.8-pg
          - v1.1.9-pg
          - v1.2.0-pg
          - v1.2.3-pg
        description: 'ref'
jobs:
  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Clone and build frontend
        run: |
          git clone https://github.com/komari-monitor/komari-web komari-web
          cd komari-web
          npm install
          npm run build
          cd ..
          mkdir -p web/public/defaultTheme/dist
          rm -rf web/public/defaultTheme/dist/*
          cp -r komari-web/dist/* web/public/defaultTheme/dist/
          cp -f komari-web/komari-theme.json web/public/defaultTheme/
          if [ -f komari-web/preview.png ]; then cp -f komari-web/preview.png web/public/defaultTheme/; fi
          if [ -f komari-web/perview.png ]; then cp -f komari-web/perview.png web/public/defaultTheme/; fi
          # Compatibility: ensure both filenames exist if only one is present
          if [ -f web/public/defaultTheme/preview.png ] && [ ! -f web/public/defaultTheme/perview.png ]; then cp -f web/public/defaultTheme/preview.png web/public/defaultTheme/perview.png; fi
          if [ -f web/public/defaultTheme/perview.png ] && [ ! -f web/public/defaultTheme/preview.png ]; then cp -f web/public/defaultTheme/perview.png web/public/defaultTheme/preview.png; fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Zig Compiler
        uses: mlugg/setup-zig@v2.2.1
        with:
          use-cache: 'false'
          cache-size-limit: '0'

      - name: Set up the environment
        run: |
          if [ "${{ inputs.os }}" == "windows" ] && [ "${{ inputs.arch }}" == "amd64" ]; then
            echo "ZIG_TARGET_TRIPLE=x86_64-windows-gnu" >> $GITHUB_ENV
          elif [ "${{ inputs.os }}" == "windows" ] && [ "${{ inputs.arch }}" == "arm64" ]; then
            echo "ZIG_TARGET_TRIPLE=aarch64-windows-gnu" >> $GITHUB_ENV
          elif [ "${{ inputs.os }}" == "windows" ] && [ "${{ inputs.arch }}" == "386" ]; then
            echo "ZIG_TARGET_TRIPLE=x86-windows-gnu" >> $GITHUB_ENV
          elif [ "${{ inputs.os }}" == "linux" ] && [ "${{ inputs.arch }}" == "arm64" ]; then
            echo "ZIG_TARGET_TRIPLE=aarch64-linux-musl" >> $GITHUB_ENV
          elif [ "${{ inputs.os }}" == "linux" ] && [ "${{ inputs.arch }}" == "amd64" ]; then
            echo "ZIG_TARGET_TRIPLE=x86_64-linux-musl" >> $GITHUB_ENV
          elif [ "${{ inputs.os }}" == "linux" ] && [ "${{ inputs.arch }}" == "386" ]; then
            echo "ZIG_TARGET_TRIPLE=x86-linux-musl" >> $GITHUB_ENV
          else
            echo "Unsupported OS/ARCH combination" && exit 1
          fi
          if [ "${{ inputs.os }}" == "windows" ]; then
           echo "binary_extension=.exe" >> $GITHUB_ENV
          elif [ "${{ inputs.os }}" == "linux" ]; then
           echo "binary_extension=" >> $GITHUB_ENV
          else
           echo "Unsupported OS/ARCH combination" && exit 1
          fi


      - name: Build binary
        env:
          GOOS: ${{ inputs.os }}
          GOARCH: ${{inputs.arch}}
          CGO_ENABLED: 1
          CC: zig cc -target ${{ env.ZIG_TARGET_TRIPLE }}
          GIN_MODE: release
          binary_extension: ${{ env.binary_extension }}
        run: |
          BINARY_NAME=komari-${{ inputs.os }}-${{ inputs.arch }}
          # Append the appropriate executable extension based on the OS
          if [ "${{ env.binary_extension }}" != "" ]; then
            BINARY_NAME=${BINARY_NAME}${{ env.binary_extension }}
          fi
          VERSION="${{ github.sha }}"
          VERSION_HASH="${{ github.sha }}"
          go build -trimpath -ldflags="-s -w -X github.com/komari-monitor/komari/utils.CurrentVersion=${VERSION} -X github.com/komari-monitor/komari/utils.VersionHash=${VERSION_HASH}" -o $BINARY_NAME

      - name: Upload binary as artifact github
        uses: actions/upload-artifact@v4
        with:
          name: komari-${{ inputs.os }}-${{ inputs.arch }}
          path: komari-${{ inputs.os }}-${{ inputs.arch }}*
